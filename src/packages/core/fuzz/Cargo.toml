[package]
name = "chromium-bridge-fuzz"
version = "0.0.0"
publish = false
edition = "2021"
license = "Apache-2.0"

[package.metadata]
cargo-fuzz = true

# Its own workspace so the fuzz crate (nightly + libFuzzer only) never enters
# the main `cargo build`/`cargo test` graph. The root Cargo.toml also lists it
# under [workspace].exclude.
[workspace]

# Excluded from the root workspace means the workspace-wide unsafe_code deny
# does not reach this crate; re-declare the quarantine here so fuzz targets
# stay unsafe-free. (`fuzz_target!` expands to libFuzzer's unsafe extern
# hooks, but the lint does not fire on external-macro expansions.)
[lints.rust]
unsafe_code = "deny"

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
libfuzzer-sys = "0.4"
serde_json = "1"
chromium-bridge-core = { path = "..", features = ["fuzzing"] }

[profile.release]
debug = 1

# One binary per wire parser at a trust boundary. Each feeds arbitrary bytes to
# the real decoder and asserts (implicitly, via libFuzzer catching a panic or
# abort) that no input crashes it -- the robustness guarantee for a parser that
# runs on a security boundary under `panic = "abort"`.
[[bin]]
name = "nm_frame"
path = "fuzz_targets/nm_frame.rs"
test = false
doc = false
bench = false

[[bin]]
name = "mcp_jsonrpc"
path = "fuzz_targets/mcp_jsonrpc.rs"
test = false
doc = false
bench = false

[[bin]]
name = "bridge_envelope"
path = "fuzz_targets/bridge_envelope.rs"
test = false
doc = false
bench = false

[[bin]]
name = "handshake"
path = "fuzz_targets/handshake.rs"
test = false
doc = false
bench = false

[[bin]]
name = "attach"
path = "fuzz_targets/attach.rs"
test = false
doc = false
bench = false

# The semantic layer behind the decoders: verifiers and validators that run on
# attacker-controlled input after it parses. Structured (Arbitrary) inputs
# where the surface is typed fields, raw bytes where it is a byte parser.
[[bin]]
name = "handshake_verify"
path = "fuzz_targets/handshake_verify.rs"
test = false
doc = false
bench = false

[[bin]]
name = "classify_frame"
path = "fuzz_targets/classify_frame.rs"
test = false
doc = false
bench = false

[[bin]]
name = "enclave_der"
path = "fuzz_targets/enclave_der.rs"
test = false
doc = false
bench = false

[[bin]]
name = "enclave_challenge"
path = "fuzz_targets/enclave_challenge.rs"
test = false
doc = false
bench = false

[[bin]]
name = "registration_manifest"
path = "fuzz_targets/registration_manifest.rs"
test = false
doc = false
bench = false
