[package]
name = "chromium-bridge-core"
version.workspace = true
edition.workspace = true
description = "Chromium Bridge library: IPC, protocols, session, tools, enclave"
license.workspace = true

[dependencies]
hmac.workspace = true
libc.workspace = true
schemars = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
thiserror.workspace = true
ts-rs = { workspace = true, optional = true }

[features]
# Contract-generation apparatus (ADR-0028): JSON Schema derivation for the
# bridge envelopes, used only by the emit_envelope_schema example that feeds
# the CI double-derivation diff (scripts/check-envelope-parity.ts). Off by
# default and enabled by no binary, so default and release builds never
# compile schemars (--all-features builds do).
envelope-schema = ["dep:schemars"]
# TypeScript derivation for the audit types the desktop app returns verbatim
# (`just gen` -> src/apps/desktop/ui/src/lib/commands.gen.ts). Gen-only, same
# posture as envelope-schema: off by default, enabled only by the desktop
# crate's own ts-export feature, never compiled into a shipped binary.
ts-export = ["dep:ts-rs"]

[[example]]
name = "emit_envelope_schema"
required-features = ["envelope-schema"]

# Emits the canonical contract (tools, errors, capabilities, identity,
# protocol version) as JSON for scripts/gen-ops.ts (`just gen`). Plain
# serde_json over the library's own data - no feature, no extra deps.
[[example]]
name = "emit_contract"

[dev-dependencies]
proptest.workspace = true

# `loom` model-checks the broker's ref-count concurrency (src/packages/core/src/broker.rs).
# It is only built under `--cfg loom`, which swaps the ref-count's Mutex/Condvar
# for loom's instrumented versions; a normal build never pulls it in.
[target.'cfg(loom)'.dev-dependencies]
loom = "0.7"

[lints]
workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation.workspace = true
security-framework.workspace = true
security-framework-sys.workspace = true

[target.'cfg(windows)'.dependencies]
winreg.workspace = true
