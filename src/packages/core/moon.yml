# moon tasks for the Rust security core. These are the canonical rust gate
# steps: the root ci gate depends on core:fmt-check, core:lint, core:test,
# and core:test-doc (moon is the canonical command interface, phase two).
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'rust'
layer: 'library'

# Cargo resolves the workspace from the root Cargo.toml (which pins the
# default members to the core + host), so run every cargo verb from the
# workspace root - byte-identical to running the cargo verbs by hand.
taskOptions:
  runFromWorkspaceRoot: true

fileGroups:
  # Everything a workspace-level cargo verb can read: every member's sources
  # (cargo fmt formats ALL members, including the non-default desktop crate),
  # the workspace manifests, and the toolchain/lint pins.
  workspace-rust:
    - '/src/packages/core/**/*'
    - '/src/apps/host/**/*'
    - '/src/apps/desktop/**/*.rs'
    - '/src/apps/desktop/Cargo.toml'
    - '/Cargo.toml'
    - '/Cargo.lock'
    - '/rust-toolchain.toml'
    - '/rustfmt.toml'
    - '/clippy.toml'

tasks:
  build:
    description: 'Build the cargo workspace default members (debug)'
    command: 'cargo build'
    toolchains: ['system']
    inputs: ['@group(workspace-rust)', '$RUSTFLAGS']
    options:
      # cargo owns target/ and its own incremental cache; a moon cache hit
      # must never stand in for a missing build artifact.
      cache: false

  test:
    description: 'Rust unit + integration tests (cargo-nextest)'
    command: 'cargo nextest run'
    toolchains: ['system']
    inputs: ['@group(workspace-rust)', '$RUSTFLAGS']
    options:
      cache: false # in the ci gate: gates are never cached

  test-doc:
    description: 'Rust doctests'
    command: 'cargo test --doc'
    toolchains: ['system']
    inputs: ['@group(workspace-rust)', '$RUSTFLAGS', '$RUSTDOCFLAGS']
    options:
      cache: false # in the ci gate: gates are never cached

  lint:
    description: 'Lint Rust, denying all warnings (the CI gate)'
    command: 'cargo clippy --all-targets -- -D warnings'
    toolchains: ['system']
    inputs: ['@group(workspace-rust)', '$RUSTFLAGS']
    options:
      cache: false # in the ci gate: gates are never cached

  fmt-check:
    description: 'Verify Rust formatting (CI gate)'
    command: 'cargo fmt --check'
    toolchains: ['system']
    inputs: ['@group(workspace-rust)']
    options:
      cache: false # in the ci gate: gates are never cached
