# moon tasks for the MV3 extension. moon is the canonical command interface
# (phase two); extension:build and extension:test are steps of the root ci
# gate.
#
# Inputs include src/packages/shared (imported as source via workspace:*) and
# the inherited rust-contract file group (.moon/tasks/all.yml): the extension
# enforces the contract's generated validators at its trust boundaries, so a
# Rust core change must invalidate these caches. Never narrow that edge.
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
dependsOn: ['shared']

fileGroups:
  # What every extension task can read beyond the project tree.
  upstream:
    - '/src/packages/shared/**/*'
    - '/tsconfig.base.json'
    - '/package.json'
    - '/bun.lock'

tasks:
  build:
    # package.json build: gen-icons then wxt build. The icon generator reads
    # assets/icon/*.svg and lives in scripts/ (gen-icons.ts + its imports);
    # the whole scripts/ tree is declared so a new helper import there can
    # never be an undeclared input.
    description: 'Build the extension bundle (src/ -> build/extension/; generates icons first)'
    command: 'bun run build'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '@group(upstream)'
      - '@group(rust-contract)'
      - '/scripts/**/*'
    outputs:
      # Only the bundle. The intermediate icon rasters the build writes into
      # src/public/icons/ are regenerated by every real build and consumed by
      # nothing else, and declaring a gitignored dir the command deletes and
      # rewrites races moon's hasher.
      - '/build/extension'
    options:
      cache: false # in the ci gate: gates are never cached

  dev:
    description: 'WXT dev mode: rebuild on change'
    command: 'bun run dev'
    toolchains: ['system']
    preset: 'server'

  test:
    description: "Unit-test the extension's shared modules (vitest + fakeBrowser; no real browser)"
    command: 'bun run test'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '@group(upstream)'
      - '@group(rust-contract)'
      # The theme-parity test reads the desktop UI's stylesheet (canonical)
      # and the landing page's palette copy.
      - '/src/apps/desktop/ui/**/*'
      - '/src/apps/web/src/styles/landing.css'
    options:
      cache: false # in the ci gate: gates are never cached

  typecheck:
    description: "Type-check the extension (tsc against the WXT-generated tsconfig)"
    # tsconfig.json extends the generated .wxt/tsconfig.json (gitignored, so
    # invisible to moon's hasher); never cache against an unhashed input.
    command: 'bun run typecheck'
    toolchains: ['system']
    options:
      cache: false

  lint:
    description: "Biome lint for the extension workspace"
    command: 'bunx biome lint $projectSource'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '/biome.json'
      - '/.gitignore'
      - '/package.json'
      - '/bun.lock'
    options:
      runFromWorkspaceRoot: true
