# moon tasks for the MV3 extension. The justfile recipes build-ext / test-ext
# delegate here; the justfile stays the front door (AGENTS.md).
#
# Inputs include src/packages/shared (imported as source via workspace:*) and
# the inherited rust-contract file group (.moon/tasks/all.yml): the extension
# enforces the contract's generated validators at its trust boundaries, so a
# Rust core change must invalidate these caches. Never narrow that edge.
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
dependsOn: ['shared']

fileGroups:
  # What every extension task can read beyond the project tree.
  upstream:
    - '/src/packages/shared/**/*'
    - '/tsconfig.base.json'
    - '/package.json'
    - '/bun.lock'

tasks:
  build:
    # package.json build: gen-icons then wxt build. The icon generator reads
    # assets/icon/*.svg and lives in scripts/ (gen-icons.ts + its imports);
    # the whole scripts/ tree is declared so a new helper import there can
    # never be an undeclared input.
    command: 'bun run build'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '@group(upstream)'
      - '@group(rust-contract)'
      - '/assets/icon/**/*'
      - '/scripts/**/*'
    outputs:
      # Only the bundle. The intermediate icon rasters the build writes into
      # src/public/icons/ are regenerated by every real build and consumed by
      # nothing else, and declaring a gitignored dir the command deletes and
      # rewrites races moon's hasher.
      - '/build/extension'

  dev:
    command: 'bun run dev'
    toolchains: ['system']
    preset: 'server'

  test:
    command: 'bun run test'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '@group(upstream)'
      - '@group(rust-contract)'
      # The theme-parity test reads the desktop UI's stylesheet.
      - '/src/apps/desktop/ui/**/*'

  typecheck:
    # tsconfig.json extends the generated .wxt/tsconfig.json (gitignored, so
    # invisible to moon's hasher); never cache against an unhashed input.
    command: 'bun run typecheck'
    toolchains: ['system']
    options:
      cache: false

  lint:
    command: 'bunx biome lint $projectSource'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '/biome.json'
      - '/.gitignore'
      - '/package.json'
      - '/bun.lock'
    options:
      runFromWorkspaceRoot: true
