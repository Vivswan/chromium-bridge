kill:
  desc: "Engage cuts every client off from every browser immediately, even mid-action. The state survives restarts."
  release_note: "Release requires the same explicit act here, or `chromium-bridge unkill` - nothing releases it silently."
  engage: "Engage kill switch"
  release: "Release kill switch"
  state_alive: "Off - the bridge is serving"
  state_killed: "Engaged - all bridge activity is refused"
  state_unknown: "State unreadable - failing closed (see `chromium-bridge doctor`)"
  state_unmirrored: "No state received from the host yet"
  updated: "Last update: $1"
  release_confirm: "Release the kill switch? MCP clients will be able to drive this browser again."
  failed: "Kill switch request failed: $1"
  no_reply: "no reply from the native host"

