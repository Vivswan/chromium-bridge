  na_title: "This platform has no Secure Enclave; pairing is unavailable (macOS only)."
  na_desc: "This does not block the bridge: it runs on base authentication (Linux: UDS + peer-UID + HMAC + binary-signature check; Windows: HMAC only). The 'host binary replaced by a same-user process' residual cannot be covered by pairing here; see the threat model."
  state_pinned: "Paired; public key pinned."
  state_pending: "Awaiting approval: compare the fingerprint."
  state_compromised: "Verification failed; the bridge is blocked."
  state_unpaired: "Not paired."
  pinned_at: "Pinned at $1"
  last_verified: "Last manual verification: $1"
  never_verified: "Not manually verified yet"
  pending_desc: "Compare this fingerprint character-by-character with the one `chromium-bridge pair` printed in your terminal; any difference means something other than your paired host answered the challenge."
  compromised_desc: "The key that answered verification is not the pinned one. Find out why (did you revoke or reinstall the host?) before you unpair and re-run `chromium-bridge pair`."
  unpaired_blocked: "Bridge requests are currently refused until pairing completes."
  unpaired_unblocked: "'Require host pairing' is off; the bridge runs without host verification."
  btn_verify: "Verify now (Touch ID)"
  btn_revoke: "Unpair"
  btn_approve: "Fingerprints match, approve"
  btn_reject: "Fingerprints differ, reject"
  btn_pair: "Start pairing (Touch ID)"
  confirm_revoke: "Unpair? This also deletes the host's Secure Enclave key, and the bridge stays blocked until you pair again."
  confirm_revoke_compromised: "Unpairing clears the pinned key and the failure record, and deletes the host's Secure Enclave key. Continue?"
  host_revoke_pending: "Host key deletion pending: it completes on the next host connection."
  no_status: "Could not read the pairing status (background did not respond)."

