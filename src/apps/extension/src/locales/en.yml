settings:
  require_enrollment_title: "Require host pairing (Secure Enclave enrollment)"
  require_enrollment_desc: "When on, bridge requests run only after a one-time pairing ceremony pins the host's public key (ADR-0021). Pairing blocks silent enrollment - no unapproved host can drive the browser. Secure Enclave is macOS-only; on other platforms pairing is unavailable and this does NOT block the bridge (it runs on the base transport authentication)."
  require_enrollment_warn: "With this off, any local process that can write an MCP config could set up and use the bridge without your knowledge."
  page_eval_title: "Allow page_eval (run arbitrary JavaScript)"
  page_eval_desc: "When off, page_eval is refused outright and no code runs on the page. This is the most dangerous tool - turning it off eliminates silent code execution entirely (ADR-0008)."
  eval_mask_title: "Mask page_eval return values"
  eval_mask_desc: "Redact eval results by pattern: JWTs, long hex, long digit runs, token-like strings (ADR-0008)."
  eval_mask_warn: "With this off, tokens / cookies / keys may be returned to the AI verbatim."
  confirm_click_title: "Confirm high-risk clicks (submit buttons / navigating links)"
  confirm_click_desc: "Clicking a submit button or a link shows a confirmation you must approve. This is the key line against the AI silently ordering / transferring / navigating (ADR-0006)."
  confirm_click_warn: "With this off, the AI's submit/link clicks are no longer confirmed. Turn off only if you fully trust the AI."
  confirm_eval_title: "Confirm every page_eval (run arbitrary JS)"
  confirm_eval_desc: "Every page_eval shows the full code and waits for your approval (ADR-0008). page_eval runs arbitrary JavaScript - the highest-risk action."
  confirm_eval_warn: "With this off, the AI runs arbitrary JS with no prompt. Turn off only if you fully trust the AI and need hands-off automation."
  confirm_tab_close_title: "Confirm tab_close (closing a tab)"
  confirm_tab_close_desc: "Closing a tab asks for approval first."
  confirm_tab_close_warn: "With this off, the AI closes tabs with no prompt."
  warn_precise_title: "Warn before a precise snapshot"
  warn_precise_desc: "Shows an in-page notice before page_snapshot_precise (which uses chrome.debugger). Chrome briefly shows a 'debugging' banner (ADR-0009)."
  group_tabs_title: "Group the AI's tabs into a 'Chromium Bridge' group"
  group_tabs_desc: "Tabs opened via tab_open are collected into a named tab group, visually separated from yours and collapsible/closable as a unit. On by default (ADR-0018)."
  cdp_mode_title: "Route all page operations through CDP (chrome.debugger)"
  cdp_mode_desc: "When on, all page operations use CDP (chrome.debugger) instead of injecting a content script; lets page_eval run on strict-CSP sites. Off by default (ADR-0017)."
  cdp_mode_warn: "When on, Chrome keeps a 'debugging this browser' banner up (the debugger stays attached), and the access surface is larger. Enable only to bypass CSP or for uniform deep control."
  file_upload_title: "Allow page_upload (upload a local file)"
  file_upload_desc: "When on, the AI can attach a local file to a page's file input and upload it. Off by default. This is a local-file exfiltration channel: a hijacked model could upload your private files. Every call still shows a confirmation with the full file path."
  file_upload_warn: "When on, the AI can read and upload local files (each path confirmed). Enable only when you truly need the AI to upload a specific file."
  handle_dialog_title: "Allow page_handle_dialog (respond to dialogs)"
  handle_dialog_desc: "When on, the AI can accept/dismiss a page's alert / confirm / prompt dialog (via chrome.debugger). Off by default. A dialog blocks the page, so the opt-in is the only gate."
  handle_dialog_warn: "Accepting a dialog can confirm a dangerous action on your behalf. Enable only if you trust the AI and truly need it."
  allow_all_title: "Allow all sites (skip per-site approval)"
  allow_all_desc: "When on, the AI can act on any http(s) site with no per-site prompt. Enabling requests the <all_urls> host permission. Suits full-auto browsing; otherwise keep it off and use the per-site allowlist below."
  allow_all_warn: "When on, any site (banking, email, intranet) can be operated on with no approval. Take care."
  reverify_label: "Periodic re-verification interval"
  reverify_unit: "ms (0 = off, default)"
  reverify_desc: "Above 0, on reconnect the host is re-verified against the pin when the last success is older than this interval (raises a Touch ID prompt). This bounds the 'host silently replaced' window; a verification failure blocks the bridge immediately."
  grace_label: "Re-confirm grace window"
  grace_unit: "ms (0 = confirm every time)"
  click_timeout_label: "Click confirmation timeout"
  click_timeout_unit: "ms (auto-denies on timeout)"
  eval_timeout_label: "Eval confirmation timeout"
  eval_timeout_unit: "ms (auto-denies on timeout)"
  tools_desc: "Unchecked tools return a 'tool disabled in settings' error when the AI calls them. The AI can still see the tool exists but cannot run it."
  add_site_placeholder: "https://example.com/*"
  add_site_format: "Format should be https://host/*"
  add_site_parse_failed: "Could not parse the URL"
  allow_all_declined: "<all_urls> not granted; kept per-site approval"
  allow_all_granted: "Allowing all sites"
  allow_all_reverted: "Restored per-site approval"

