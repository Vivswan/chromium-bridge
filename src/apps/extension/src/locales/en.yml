# English (default locale). Flat-ish nested keys; positional $1 substitutions.
# Every key here MUST exist in zh_CN.yml and zh_TW.yml (CI: locales test).
# Control Tower voice: terse, plain-language, one consequence line per control.
extDescription: "Let an MCP client (Claude Code, Codex, ...) operate your real Chrome - your tabs and logins. You approve new sites and risky actions."

app:
  name: "Chromium Bridge"

common:
  allow: "Allow"
