  pending_allow_on: "Allow on $1"
  pending_consequence: "Allow lets the client click, navigate, and read here as you until you remove the site."
  pair_compare: "Compare, then approve"
  pair_explainer: "The Chromium Bridge app on this Mac is showing the same twelve blocks right now. Matching codes mean no impostor sits between this extension and your host."
  pair_consequence: "Approve only a character-for-character match. Different codes mean something else is posing as the host: deny."
