  killed_release_note: "This popup can only engage, never release. Release from the settings page or `chromium-bridge unkill`."
  killed_release_cta: "Release in settings"
  pair_foot: "Until you pair, this extension does nothing."
  open_settings: "Open settings"
  ext_version: "ext $1"

