options:
  title: "Chromium Bridge settings"
  subtitle: "Changes save immediately."
  section_security: "Security"
  section_pairing: "Host pairing (Secure Enclave)"
  section_clients: "Trusted MCP clients"
  section_tabs: "Tabs"
  section_execution: "Execution mode"
  section_timeouts: "Confirmation timeouts"
  section_tools: "Tools"
  section_sites: "Sites"
  section_kill: "Kill switch"
  section_audit: "Recent activity"

settings:
  require_enrollment_title: "Require host pairing"
  require_enrollment_desc: "Bridge requests run only after a one-time ceremony pins the host's Secure Enclave key (ADR-0021). macOS only; elsewhere the bridge runs on base transport authentication."
  require_enrollment_warn: "Off, any local process that can write an MCP config could set up and use this bridge without your knowledge."
  page_eval_title: "Allow page_eval (arbitrary JavaScript)"
  page_eval_desc: "Off, page_eval is refused outright and no client code ever runs on a page (ADR-0008)."
  eval_mask_title: "Mask page_eval return values"
  eval_mask_desc: "Redacts JWTs, long hex, long digit runs, and token-like strings from eval results (ADR-0008)."
  eval_mask_warn: "Off, tokens, cookies, and keys can be returned to the client verbatim."
  confirm_click_title: "Confirm high-risk clicks"
  confirm_click_desc: "A submit button or navigating link is clicked only after you approve it (ADR-0006)."
  confirm_click_warn: "Off, the client submits forms and follows links as you with no prompt."
  confirm_eval_title: "Confirm every page_eval"
  confirm_eval_desc: "Every script shows its full code and waits for your decision (ADR-0008)."
  confirm_eval_warn: "Off, the client runs arbitrary JavaScript with no prompt."
  touchid_confirm_title: "Approve page_eval / page_upload with Touch ID"
  touchid_confirm_desc: "On a paired Mac, the two highest-risk approvals take a Secure Enclave fingerprint tap no page or program can fake (ADR-0031)."
  touchid_confirm_warn: "Off, those approvals fall back to the window's Allow button - still confirmed, but not hardware-backed."
  confirm_tab_close_title: "Confirm tab_close"
  confirm_tab_close_desc: "Closing a tab asks you first."
  confirm_tab_close_warn: "Off, the client closes tabs with no prompt."
  warn_precise_title: "Warn before a precise snapshot"
  warn_precise_desc: "Shows an in-page notice before page_snapshot_precise attaches the debugger; Chrome flashes its own banner too (ADR-0009)."
  group_tabs_title: "Group bridge tabs"
  group_tabs_desc: "Client-opened tabs collect in a 'Chromium Bridge' tab group, so machine-driven tabs stay visible (ADR-0018)."
  cdp_mode_title: "Route page operations through CDP"
  cdp_mode_desc: "All page operations use chrome.debugger instead of a content script; lets page_eval run on strict-CSP sites (ADR-0017)."
  cdp_mode_warn: "On, Chrome keeps a 'debugging this browser' banner up and the access surface is larger."
  file_upload_title: "Allow page_upload (local files)"
  file_upload_desc: "The client can attach a local file to a page; every call confirms the exact path first."
  file_upload_warn: "On, this is a local-file exfiltration channel - a hijacked model could upload your private files."
  handle_dialog_title: "Allow page_handle_dialog"
  handle_dialog_desc: "The client can accept or dismiss a page's alert / confirm / prompt dialog (via chrome.debugger)."
  handle_dialog_warn: "On, accepting a dialog can confirm a dangerous action on your behalf."
  allow_all_title: "Allow all sites"
  allow_all_desc: "Skips per-site approval; enabling also triggers the browser's all-sites data permission prompt."
  allow_all_warn: "On, clients can drive every site you are logged in to, including banking and email."
  reverify_label: "Periodic re-verification interval"
  reverify_unit: "ms (0 = off, default)"
  reverify_desc: "Above 0, a reconnect re-verifies the host against the pin when the last success is older than this (raises Touch ID); a failure blocks the bridge immediately."
  grace_label: "Re-confirm grace window"
  grace_unit: "ms (0 = confirm every time)"
  click_timeout_label: "Click confirmation timeout"
  click_timeout_unit: "ms (auto-denies on timeout)"
  eval_timeout_label: "Eval confirmation timeout"
  eval_timeout_unit: "ms (auto-denies on timeout)"
  tools_desc: "A disabled tool returns a 'disabled in settings' error. The client can see it exists but cannot run it."
  sites_consequence: "Clients act only on these sites. Everything else is refused before it reaches the page."
  add_site_placeholder: "https://example.com/*"
  add_site_format: "Format should be https://host/*"
  add_site_parse_failed: "Could not parse the URL"
  allow_all_declined: "<all_urls> not granted; kept per-site approval"
  allow_all_granted: "Allowing all sites"
  allow_all_reverted: "Restored per-site approval"

enroll:
  loading: "Loading..."
  na_title: "This platform has no Secure Enclave; pairing is unavailable (macOS only)."
  na_desc: "This does not block the bridge: it runs on base authentication (Linux: UDS + peer-UID + HMAC + binary-signature check; Windows: HMAC only). The 'host binary replaced by a same-user process' residual cannot be covered by pairing here; see the threat model."
  state_pinned: "Paired - the host's public key is pinned."
  state_pending: "The host wants to pair with this browser"
  state_compromised: "Verification failed - the bridge is blocked."
  state_unpaired: "Not paired."
  pill_pending: "Approval needed"
  col_extension: "This extension sees"
  col_terminal: "The terminal shows"
  col_terminal_hint: "Read it from where `chromium-bridge pair` is running."
  pinned_at: "Pinned at $1"
  last_verified: "Last manual verification: $1"
  never_verified: "Not manually verified yet"
  pending_desc: "Approve only if both fingerprints match character for character. A mismatch means another program is posing as the host."
  compromised_desc: "The key that answered verification is not the pinned one. Find out why (did you revoke or reinstall the host?) before you unpair and re-run `chromium-bridge pair`."
  unpaired_blocked: "Bridge requests are refused until pairing completes."
  unpaired_unblocked: "'Require host pairing' is off; the bridge runs without host verification."
  btn_verify: "Verify now (Touch ID)"
  btn_revoke: "Unpair"
  btn_approve: "They match - approve"
  btn_reject: "They differ - reject"
  btn_pair: "Start pairing (Touch ID)"
  confirm_revoke: "Unpair? This also deletes the host's Secure Enclave key, and the bridge stays blocked until you pair again."
  confirm_revoke_compromised: "Unpairing clears the pinned key and the failure record, and deletes the host's Secure Enclave key. Continue?"
  host_revoke_pending: "Host key deletion pending: it completes on the next host connection."
  no_status: "Could not read the pairing status (background did not respond)."

clients:
  desc: "MCP client harnesses this machine's bridge admits. Revoking one takes effect immediately: a connected client is dropped and cannot re-attach."
  loading: "Loading..."
  refresh: "Refresh"
  revoke: "Revoke"
  unenrolled: "No trusted-client allowlist yet: any local process that runs the bridge binary can drive the browser. Pair a client with `chromium-bridge pair-client`."
  empty: "The allowlist exists but is empty: every client is refused (locked)."
  error: "Could not read the trusted clients: $1"
  no_reply: "no reply from the native host"
  revoke_confirm: "Revoke trusted client \"$1\"? A live connection is dropped immediately."
  revoke_failed: "Revoke failed: $1"
  anchor_hash: "hash"
  anchor_team: "Team ID"

