  spoof_note_browser: "Browser gate held for your decision."
  spoof_note_host: "Host gate held: this action needs a fingerprint, not just a click."
  spoof_note_drawn: "Drawn by the Chromium Bridge extension in its own window, never by a web page."
  via: "Requested via"
  this_page: "This page"
  h_click: "$1 wants a click in this tab"
  h_press: "$1 wants a keypress in this tab"
  h_select: "$1 wants to change a selection in this tab"
  h_eval: "$1 wants to run a script in this tab"
  h_tab_close: "$1 wants to close this tab"
  h_upload: "$1 wants a local file uploaded to it"
  warn_eval: "This code runs in the page with your session. It can read tokens, cookies, and page data, and can make requests as you."
  warn_upload: "The file at this exact path will leave your disk and be sent to the page."
