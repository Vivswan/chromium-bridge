  compromised_desc: "响应验证的密钥不是已固定的那把。请先查明原因（你是否吊销或重装过主机？），再解除配对并重新运行 `chromium-bridge pair`。"
  unpaired_blocked: "在完成配对之前，桥接请求目前会被拒绝。"
