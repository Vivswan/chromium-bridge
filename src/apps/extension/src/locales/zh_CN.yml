settings:
  require_enrollment_title: "要求主机配对（Secure Enclave 注册）"
  require_enrollment_desc: "开启后，桥接请求只有在一次性配对流程固定主机公钥之后才会执行（ADR-0021）。配对可阻止静默注册：未经批准的主机无法驱动浏览器。Secure Enclave 仅限 macOS；其他平台不支持配对，此开关也不会阻止桥接运行（改用基础传输认证）。"
  require_enrollment_warn: "关闭后，任何能写入 MCP 配置的本地进程都可能在你不知情的情况下设置并使用此桥接。"
  page_eval_title: "允许 page_eval（运行任意 JavaScript）"
  page_eval_desc: "关闭后，page_eval 会被直接拒绝，任何代码都不会在页面上运行。这是最危险的工具，关闭它可彻底杜绝静默代码执行（ADR-0008）。"
  eval_mask_title: "遮蔽 page_eval 的返回值"
  eval_mask_desc: "按模式对 eval 结果做脱敏：JWT、超长 hex、超长数字串、疑似令牌的字符串（ADR-0008）。"
  eval_mask_warn: "关闭后，令牌 / Cookie / 密钥可能被原样返回给 AI。"
  confirm_click_title: "确认高风险点击（提交按钮 / 跳转链接）"
  confirm_click_desc: "点击提交按钮或链接时会显示确认，需要你批准。这是防止 AI 静默下单 / 转账 / 跳转的关键防线（ADR-0006）。"
  confirm_click_warn: "关闭后，AI 的提交/链接点击将不再需要确认。只有在完全信任 AI 时才可关闭。"
  confirm_eval_title: "每次 page_eval 都需确认（运行任意 JS）"
  confirm_eval_desc: "每次 page_eval 都会显示完整代码并等待你批准（ADR-0008）。page_eval 运行任意 JavaScript，是风险最高的操作。"
  confirm_eval_warn: "关闭后，AI 可在没有任何提示的情况下运行任意 JS。只有在完全信任 AI 且需要无人值守自动化时才可关闭。"
  touchid_confirm_title: "用触控 ID 批准 page_eval / page_upload"
  touchid_confirm_desc: "在已配对的 Mac 上，这两个最高风险操作的批准需要安全隔区的触控 ID 轻触，任何页面或程序都无法伪造（ADR-0031）。确认窗口仍会显示正在批准的具体内容。"
  touchid_confirm_warn: "关闭后，这些确认将改用扩展窗口的允许按钮，仍需确认，但没有硬件轻触作保。"
  confirm_tab_close_title: "确认 tab_close（关闭标签页）"
  confirm_tab_close_desc: "关闭标签页前会先请求批准。"
  confirm_tab_close_warn: "关闭后，AI 关闭标签页时不会有任何提示。"
  warn_precise_title: "精确快照前先提醒"
  warn_precise_desc: "在 page_snapshot_precise（使用 chrome.debugger）之前在页面内显示提示。Chrome 会短暂显示「正在调试」横幅（ADR-0009）。"
  group_tabs_title: "把 AI 的标签页归入「Chromium Bridge」标签组"
  group_tabs_desc: "通过 tab_open 打开的标签页会被收进一个命名标签组，与你的标签页在视觉上分开，并可作为整体折叠或关闭。默认开启（ADR-0018）。"
  cdp_mode_title: "所有页面操作改走 CDP（chrome.debugger）"
  cdp_mode_desc: "开启后，所有页面操作改用 CDP（chrome.debugger）而不是注入内容脚本；这让 page_eval 能在严格 CSP 的站点上运行。默认关闭（ADR-0017）。"
  cdp_mode_warn: "开启期间，Chrome 会一直显示「正在调试此浏览器」横幅（调试器保持附加），并且访问面更大。仅在需要绕过 CSP 或统一的深度控制时启用。"
  file_upload_title: "允许 page_upload（上传本地文件）"
  file_upload_desc: "开启后，AI 可以把本地文件附加到页面的文件输入框并上传。默认关闭。这是一条本地文件外泄通道：被劫持的模型可能上传你的私密文件。每次调用仍会显示含完整文件路径的确认。"
  file_upload_warn: "开启后，AI 能读取并上传本地文件（每个路径都需确认）。仅在确实需要 AI 上传某个文件时才启用。"
  handle_dialog_title: "允许 page_handle_dialog（响应对话框）"
  handle_dialog_desc: "开启后，AI 可以接受/关闭页面的 alert / confirm / prompt 对话框（通过 chrome.debugger）。默认关闭。对话框会阻塞页面，因此这个开关是唯一的闸门。"
  handle_dialog_warn: "接受对话框可能会以你的名义确认危险操作。仅在信任 AI 且确实需要时启用。"
  allow_all_title: "允许所有站点（跳过逐站点批准）"
  allow_all_desc: "开启后，AI 可在任何 http(s) 站点上操作，且不再逐站点提示。启用时会申请 <all_urls> 主机权限。适合全自动浏览；否则请保持关闭，使用下方的逐站点允许列表。"
  allow_all_warn: "开启后，任何站点（银行、邮箱、内网）都可在未经批准的情况下被操作。请务必小心。"
  reverify_label: "定期重新验证间隔"
  reverify_unit: "ms（0 = 关闭，默认）"
  reverify_desc: "大于 0 时，重连时若距上次成功验证超过该间隔，会依据固定的公钥重新验证主机（会弹出 Touch ID 提示）。这限定了「主机被静默替换」的时间窗口；验证失败会立即阻止桥接。"
  grace_label: "重新确认宽限窗口"
  grace_unit: "ms（0 = 每次都确认）"
  click_timeout_label: "点击确认超时"
  click_timeout_unit: "ms（超时自动拒绝）"
  eval_timeout_label: "Eval 确认超时"
  eval_timeout_unit: "ms（超时自动拒绝）"
  tools_desc: "未勾选的工具在 AI 调用时会返回「工具已在设置中禁用」错误。AI 仍能看到该工具存在，但无法运行它。"
  add_site_placeholder: "https://example.com/*"
  add_site_format: "格式应为 https://host/*"
  add_site_parse_failed: "无法解析该 URL"
  allow_all_declined: "未授予 <all_urls>；已保留逐站点批准"
  allow_all_granted: "已允许所有站点"
  allow_all_reverted: "已恢复逐站点批准"

enroll:
