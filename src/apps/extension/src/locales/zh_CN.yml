  touchid_confirm_desc: "在已配对的 Mac 上，这两个最高风险操作的批准需要安全隔区的指纹轻触，任何页面或程序都无法伪造（ADR-0031）。"
  touchid_confirm_warn: "关闭后，这些批准退回到窗口的允许按钮：仍需确认，但没有硬件作保。"
