  eval_mask_desc: "对 eval 结果脱敏：JWT、超长 hex、超长数字串、疑似令牌的字符串（ADR-0008）。"
  eval_mask_warn: "关闭后，令牌、Cookie 和密钥可能被原样返回给客户端。"
  confirm_click_title: "确认高风险点击"
  confirm_click_desc: "提交按钮或跳转链接只有在你批准后才会被点击（ADR-0006）。"
  confirm_click_warn: "关闭后，客户端能以你的身份提交表单、点开链接，且没有任何提示。"
  confirm_eval_title: "每次 page_eval 都需确认"
