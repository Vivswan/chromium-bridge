settings:
  require_enrollment_title: "要求主机配对"
  require_enrollment_desc: "桥接请求只有在一次性配对流程固定主机的 Secure Enclave 密钥后才会执行（ADR-0021）。仅限 macOS；其他平台使用基础传输认证。"
  require_enrollment_warn: "关闭后，任何能写入 MCP 配置的本地进程都可能在你不知情的情况下设置并使用此桥接。"
  page_eval_title: "允许 page_eval（任意 JavaScript）"
  page_eval_desc: "关闭后，page_eval 会被直接拒绝，客户端代码绝不会在页面上运行（ADR-0008）。"
