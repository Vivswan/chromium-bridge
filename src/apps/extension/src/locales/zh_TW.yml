settings:
  require_enrollment_title: "要求主機配對（Secure Enclave 註冊）"
  require_enrollment_desc: "開啟後，橋接請求只有在一次性配對流程釘選主機公鑰之後才會執行（ADR-0021）。配對可防止無聲註冊：未經核准的主機無法操控瀏覽器。Secure Enclave 僅限 macOS；其他平台無法配對，此設定也不會封鎖橋接（改以基礎傳輸驗證運作）。"
  require_enrollment_warn: "關閉後，任何能寫入 MCP 設定的本機程序都可能在你不知情的情況下設定並使用此橋接。"
  page_eval_title: "允許 page_eval（執行任意 JavaScript）"
  page_eval_desc: "關閉後，page_eval 會被直接拒絕，任何程式碼都不會在頁面上執行。這是最危險的工具，關閉它可徹底杜絕無聲的程式碼執行（ADR-0008）。"
  eval_mask_title: "遮罩 page_eval 的回傳值"
  eval_mask_desc: "依模式遮蔽 eval 結果：JWT、過長的 hex、過長的數字串、疑似權杖的字串（ADR-0008）。"
  eval_mask_warn: "關閉後，權杖 / Cookie / 金鑰可能會原封不動地回傳給 AI。"
  confirm_click_title: "確認高風險點擊（送出按鈕 / 導航連結）"
  confirm_click_desc: "點擊送出按鈕或連結時會顯示確認，需要你核准。這是防止 AI 無聲下單 / 轉帳 / 導航的關鍵防線（ADR-0006）。"
  confirm_click_warn: "關閉後，AI 的送出/連結點擊將不再需要確認。只有在完全信任 AI 時才可關閉。"
  confirm_eval_title: "每次 page_eval 都需確認（執行任意 JS）"
  confirm_eval_desc: "每次 page_eval 都會顯示完整程式碼並等待你核准（ADR-0008）。page_eval 會執行任意 JavaScript，是風險最高的操作。"
  confirm_eval_warn: "關閉後，AI 可在沒有任何提示的情況下執行任意 JS。只有在完全信任 AI 且需要無人值守的自動化時才可關閉。"
  confirm_tab_close_title: "確認 tab_close（關閉分頁）"
  confirm_tab_close_desc: "關閉分頁前會先徵求核准。"
  confirm_tab_close_warn: "關閉後，AI 關閉分頁時不會有任何提示。"
  warn_precise_title: "精確快照前先警告"
  warn_precise_desc: "在 page_snapshot_precise（使用 chrome.debugger）之前於頁面內顯示提示。Chrome 會短暫顯示「偵錯中」橫幅（ADR-0009）。"
  group_tabs_title: "將 AI 的分頁歸入「Chromium Bridge」分頁群組"
  group_tabs_desc: "透過 tab_open 開啟的分頁會被收進一個具名分頁群組，與你的分頁在視覺上分開，並可整組摺疊或關閉。預設開啟（ADR-0018）。"
  cdp_mode_title: "所有頁面操作改走 CDP（chrome.debugger）"
  cdp_mode_desc: "開啟後，所有頁面操作改用 CDP（chrome.debugger）而非注入內容指令碼；這讓 page_eval 能在嚴格 CSP 的網站上執行。預設關閉（ADR-0017）。"
  cdp_mode_warn: "開啟期間，Chrome 會一直顯示「正在偵錯這個瀏覽器」橫幅（偵錯器保持附加），且存取面更大。僅在需要繞過 CSP 或統一的深度控制時啟用。"
  file_upload_title: "允許 page_upload（上傳本機檔案）"
  file_upload_desc: "開啟後，AI 可以將本機檔案附加到頁面的檔案輸入欄位並上傳。預設關閉。這是一條本機檔案外洩管道：被挾持的模型可能上傳你的私人檔案。每次呼叫仍會顯示含完整檔案路徑的確認。"
  file_upload_warn: "開啟後，AI 能讀取並上傳本機檔案（每個路徑都需確認）。僅在確實需要 AI 上傳特定檔案時才啟用。"
  handle_dialog_title: "允許 page_handle_dialog（回應對話方塊）"
  handle_dialog_desc: "開啟後，AI 可以接受/關閉頁面的 alert / confirm / prompt 對話方塊（透過 chrome.debugger）。預設關閉。對話方塊會阻擋頁面，因此這個選項是唯一的關卡。"
  handle_dialog_warn: "接受對話方塊可能會以你的名義確認危險操作。僅在信任 AI 且確實需要時啟用。"
  allow_all_title: "允許所有網站（略過逐站核准）"
  allow_all_desc: "開啟後，AI 可在任何 http(s) 網站上操作，且不再逐站提示。啟用時會要求 <all_urls> 主機權限。適合全自動瀏覽；否則請保持關閉，改用下方的逐站允許清單。"
  allow_all_warn: "開啟後，任何網站（銀行、電子郵件、內部網路）都可在未經核准的情況下被操作。請務必小心。"
  reverify_label: "定期重新驗證間隔"
  reverify_unit: "ms（0 = 關閉，預設）"
  reverify_desc: "大於 0 時，重新連線時若距上次成功驗證超過此間隔，會依釘選的公鑰重新驗證主機（會跳出 Touch ID 提示）。這限縮了「主機被無聲替換」的時間窗口；驗證失敗會立即封鎖橋接。"
  grace_label: "重新確認寬限期"
  grace_unit: "ms（0 = 每次都確認）"
  click_timeout_label: "點擊確認逾時"
  click_timeout_unit: "ms（逾時自動拒絕）"
  eval_timeout_label: "Eval 確認逾時"
  eval_timeout_unit: "ms（逾時自動拒絕）"
  tools_desc: "未勾選的工具在 AI 呼叫時會回傳「工具已在設定中停用」錯誤。AI 仍看得到該工具存在，但無法執行它。"
  add_site_placeholder: "https://example.com/*"
  add_site_format: "格式應為 https://host/*"
  add_site_parse_failed: "無法解析該 URL"
  allow_all_declined: "未授予 <all_urls>；已保留逐站核准"
  allow_all_granted: "已允許所有網站"
  allow_all_reverted: "已恢復逐站核准"

