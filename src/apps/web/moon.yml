# moon tasks for the Astro site (moon is the canonical command interface,
# phase two).
#
# There is deliberately NO dev task HERE: `bun run dev` in this project
# manages the astro dev daemon (`astro dev stop; ASTRO_DEV_BACKGROUND=1
# astro dev`), a backgrounding lifecycle moon's persistent-task preset would
# fight. The root dev-web task wraps it as a plain one-shot command instead.
#
# web:build keeps moon caching (the one build task that does): it is not a
# gate step - CI's web job builds on a fresh runner, and the ci gate does
# not include it - so a cache hit can never satisfy a gate.
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

tasks:
  build:
    description: "Build the web app (src/apps/web: Astro over the repo's markdown docs)"
    command: 'bun run build'
    toolchains: ['system']
    inputs:
      # The site renders the repo's own markdown (src/lib/docs.ts globs the
      # root and docs/ trees), imports the workspace version from the root
      # Cargo.toml (src/pages/index.astro), and takes site identity from
      # these env vars (src/lib/site-identity.ts).
      - '**/*'
      - '!**/node_modules/**'
      - '/*.md'
      - '/docs/**/*'
      - '/Cargo.toml'
      - '/package.json'
      - '/bun.lock'
      - '$ASTRO_SITE'
      - '$ASTRO_BASE'
    outputs:
      - '/build/web'

  lint:
    description: "Biome lint for the web app workspace"
    command: 'bunx biome lint $projectSource'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '/biome.json'
      - '/.gitignore'
      - '/package.json'
      - '/bun.lock'
    options:
      runFromWorkspaceRoot: true
