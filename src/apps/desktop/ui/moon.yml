# moon tasks for the desktop app's web UI. moon is the canonical command
# interface (phase two): desktop-ui:test is a ci gate step, and
# desktop-ui:build feeds the macOS-only desktop gates (gen-app-types /
# check-app-rust). The Tauri shell itself (src/apps/desktop) is NOT a moon
# project: bundling, signing, and the desktop Rust checks live as root tasks
# (bundle-app, check-app-rust, ...) because they orchestrate the whole repo.
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

tasks:
  build:
    description: "Desktop UI production build (what `bunx tauri build` runs first; feeds the macOS desktop gates)"
    command: 'bun run build'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '/package.json'
      - '/bun.lock'
    outputs:
      - '/build/desktop-ui'
    options:
      # Feeds the macOS desktop gates (gen-app-types embeds this dist via
      # tauri's generate_context!): gate inputs are never cache-restored.
      cache: false

  dev:
    command: 'bun run dev'
    toolchains: ['system']
    preset: 'server'

  test:
    description: 'Desktop UI unit tests (locale coverage, i18n resolution; no browser)'
    command: 'bun run test'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '/package.json'
      - '/bun.lock'
    options:
      cache: false # in the ci gate: gates are never cached

  typecheck:
    command: 'bun run typecheck'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '/package.json'
      - '/bun.lock'

  lint:
    command: 'bunx biome lint $projectSource'
    toolchains: ['system']
    inputs:
      - '**/*'
      - '!**/node_modules/**'
      - '/biome.json'
      - '/.gitignore'
      - '/package.json'
      - '/bun.lock'
    options:
      runFromWorkspaceRoot: true
