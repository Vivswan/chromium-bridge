<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <title>Gatedeck toolbar 16 - open</title>
  <!-- Hand-cut for 16px: deck thickened to 2 and the apex gap widened
       (inner ends at x 6 and 10) so it stays about 2 device px at 1x.
       Leaf rise kept at 1.5. Path-compatible with gatedeck-toolbar-16.svg. -->
  <path d="M2.6 14 Q8 3.2 13.4 14"
        fill="none" stroke="#6b7a92" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M2 5.75 L6 4.25"
        fill="none" stroke="#3fe081" stroke-width="2"
        stroke-linecap="round"/>
  <path d="M14 5.75 L10 4.25"
        fill="none" stroke="#3fe081" stroke-width="2"
        stroke-linecap="round"/>
</svg>
