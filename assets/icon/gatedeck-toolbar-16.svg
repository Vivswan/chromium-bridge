<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <title>Gatedeck toolbar 16 - closed</title>
  <!-- Hand-cut for 16px: deck thickened to 2 and snapped to the pixel
       grid (ink covers exactly y 4..6 and x 1..15 including caps).
       Path-compatible with gatedeck-toolbar-16-open.svg. -->
  <path d="M2.6 14 Q8 3.2 13.4 14"
        fill="none" stroke="#6b7a92" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M2 5 L8 5"
        fill="none" stroke="#3fe081" stroke-width="2"
        stroke-linecap="round"/>
  <path d="M14 5 L8 5"
        fill="none" stroke="#3fe081" stroke-width="2"
        stroke-linecap="round"/>
</svg>
