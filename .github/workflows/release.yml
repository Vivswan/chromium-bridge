name: Release

# Tag a version to publish prebuilt tarballs (binary + built extension) so
# users don't need Rust/Node:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # OIDC token to sign the SLSA build provenance
  attestations: write # write the build-provenance attestation

jobs:
  release:
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel (x64) macOS is intentionally NOT built and will not be
          # re-added: Apple Silicon is the supported macOS target. Rosetta 2
          # only translates x86_64 to run on Apple Silicon, not the reverse,
          # so it cannot run the arm64 build on an Intel Mac - Intel users
          # must build from source.
          - os: macos-14
            platform: macos
            arch: arm64
          # Build on an older glibc baseline for wider Linux compatibility.
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-2022
            platform: windows
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      ARCH: ${{ matrix.arch }}
      PLATFORM: ${{ matrix.platform }}
      # Pass the tag through the environment, never spliced into a run: script.
      # A crafted workflow_dispatch `tag` input cannot break out of a shell
      # command when it arrives as $RELEASE_TAG instead of being interpolated
      # into the script text. The Verify step below also constrains its shape
      # (this workflow has contents/id-token/attestations write).
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin to the tag being released. On tag push github.ref_name IS the
          # tag; on workflow_dispatch the run's ref is a branch (tags can't be
          # picked in the UI), so without this we'd build main and mislabel it
          # under inputs.tag. Mirror sbom.yml, which already pins its ref.
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          TAG="$RELEASE_TAG"
          # Fail closed on an unexpected tag shape before any later step uses it
          # in a filename. Env-indirection already blocks shell injection; this
          # keeps the tag to the release grammar (vMAJOR.MINOR.PATCH[-suffix]).
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "refusing malformed release tag: $TAG"
            exit 1
          fi
          VER="${TAG#v}"          # strip leading v
          CORE="${VER%%-*}"       # strip any -dev/-rc pre-release suffix
          CARGO_VER="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$TAG core=$CORE cargo=$CARGO_VER"
          [ "$CORE" = "$CARGO_VER" ] || { echo "tag core $CORE != Cargo version $CARGO_VER"; exit 1; }

      - name: Build binary (deterministic)
        # build-repro.ts pins SOURCE_DATE_EPOCH and remaps build paths so the
        # binary is bit-for-bit reproducible from the tag with the pinned
        # toolchain; see SECURITY.md "Release artifact integrity". It is
        # self-contained (no bun install needed; setup-bun above suffices).
        shell: bash
        run: bun scripts/build-repro.ts

      - name: Build extension bundle
        run: |
          bun install --frozen-lockfile
          bun run --cwd src/apps/extension build

      - name: Package release archive
        id: pkg
        shell: bash
        run: |
          TAG="$RELEASE_TAG"
          NAME="chromium-bridge-${TAG}-${PLATFORM}-${ARCH}"
          mkdir -p "$NAME/extension"
          cp -r build/extension/chrome-mv3 "$NAME/extension/dist"
          cp LICENSE README.md "$NAME/"
          # RELEASE.txt records which release this archive came from, so a
          # user can pick the matching published checksum / provenance
          # attestation when verifying by hand (README "Verifying your
          # binary"). Registration itself is `chromium-bridge doctor --fix`,
          # run from the extracted binary.
          {
            echo "repo=${GITHUB_REPOSITORY}"
            echo "tag=${TAG}"
            echo "platform=${PLATFORM}"
            echo "arch=${ARCH}"
          } > "$NAME/RELEASE.txt"
          if [ "$PLATFORM" = "windows" ]; then
            cp target/release/chromium-bridge.exe "$NAME/"
            BIN_FILE="chromium-bridge.exe"
            7z a -tzip "$NAME.zip" "$NAME" > /dev/null
            sha256sum "$NAME.zip" > "$NAME.zip.sha256"
            ARCHIVE="$NAME.zip"
          else
            cp target/release/chromium-bridge "$NAME/"
            BIN_FILE="chromium-bridge"
            tar czf "$NAME.tar.gz" "$NAME"
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
            else
              sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
            fi
            ARCHIVE="$NAME.tar.gz"
          fi
          # Per-binary checksum, published as its own release asset, so the
          # shipped binary can be verified after extraction (the
          # archive-level .sha256 can't be checked at that point). Hash
          # from inside $NAME so the recorded file name is the bare binary.
          if command -v shasum >/dev/null 2>&1; then
            (cd "$NAME" && shasum -a 256 "$BIN_FILE") > "$NAME.binary.sha256"
          else
            (cd "$NAME" && sha256sum "$BIN_FILE") > "$NAME.binary.sha256"
          fi
          {
            echo "name=$NAME"
            echo "archive=$ARCHIVE"
            echo "sha256file=$ARCHIVE.sha256"
            echo "binary=$NAME/$BIN_FILE"
            echo "binsha256file=$NAME.binary.sha256"
          } >> "$GITHUB_OUTPUT"

      # The built extension bundle is platform-independent, so we emit the
      # standalone zip on ONLY the macos/arm64 leg to avoid uploading duplicate
      # (conflicting) assets from both matrix legs. The linux leg skips this
      # step, and `assets` below is empty there (harmless blank lines in the
      # upload glob), so its release upload still matches only its own tarball.
      - name: Package standalone extension zip
        id: extzip
        if: matrix.platform == 'macos'
        run: |
          TAG="$RELEASE_TAG"
          NAME="chromium-bridge-extension-${TAG}"
          # Zip the built bundle with a top-level `dist/` folder so users can
          # point "Load unpacked" straight at the extracted directory.
          rm -rf dist-zip && mkdir dist-zip
          cp -r build/extension/chrome-mv3 dist-zip/dist
          (cd dist-zip && zip -r "../$NAME.zip" dist)
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$NAME.zip" > "$NAME.zip.sha256"
          else
            sha256sum "$NAME.zip" > "$NAME.zip.sha256"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          {
            echo "assets<<EOF"
            echo "$NAME.zip"
            echo "$NAME.zip.sha256"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # Attest the bare binary as well as the archive: users verify
          # after extraction, so `gh attestation verify` needs a subject whose
          # digest matches the shipped binary itself.
          subject-path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.binary }}

      # Attest the standalone extension zip on the same (macos) leg that built it.
      - name: Attest extension zip provenance
        if: matrix.platform == 'macos'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.extzip.outputs.name }}.zip

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha256file }}
            ${{ steps.pkg.outputs.binsha256file }}
            ${{ steps.extzip.outputs.assets }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          # any tag with a suffix (v0.1.0-dev, -rc.1, ...) is a prerelease
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}

  # The secrets context is not available in a job-level `if`, so a tiny
  # gate job exports "are the desktop signing secrets configured" as an
  # output. Forks and secretless checkouts skip desktop-app cleanly instead
  # of failing it; the binary+extension release above is never blocked.
  desktop-signing-secrets:
    name: desktop signing secrets present?
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Check for signing secrets
        id: check
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          PROFILE: ${{ secrets.MACOS_PROVISION_PROFILE_BASE64 }}
        run: |
          if [ -n "$CERT" ] && [ -n "$CERT_PASSWORD" ] && [ -n "$PROFILE" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "desktop signing secrets not configured; skipping the desktop-app job"
          fi

  # The macOS desktop app: build + sign the bundle (helper-bundle host with
  # its own entitlements, ADR-0026), wrap it in a .dmg, optionally notarize,
  # attest, and attach it to the same release. Signing material comes from
  # repository secrets (see docs/release.md "Desktop app secrets"); the
  # free-tier provisioning profile expires every 7 days, so the profile
  # secret needs a refresh shortly before tagging a release.
  desktop-app:
    name: macos desktop app (.dmg)
    needs: desktop-signing-secrets
    if: needs.desktop-signing-secrets.outputs.present == 'true'
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      # Notarization is optional on top of signing: the free Apple
      # Development certificate cannot notarize, so these secrets exist only
      # once a paid Developer ID is in place.
      HAVE_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "refusing malformed release tag: $TAG"
            exit 1
          fi
          VER="${TAG#v}"
          CORE="${VER%%-*}"
          CARGO_VER="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$TAG core=$CORE cargo=$CARGO_VER"
          [ "$CORE" = "$CARGO_VER" ] || { echo "tag core $CORE != Cargo version $CARGO_VER"; exit 1; }

      # An ephemeral keychain scoped to this job: the certificate never
      # touches the login keychain, and the cleanup step deletes the whole
      # keychain even when the build fails.
      - name: Import signing certificate into an ephemeral keychain
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          # Export the keychain path and arm the p12 cleanup FIRST, so a
          # failure partway through this step still lets the delete step and
          # this trap remove the material.
          echo "SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          trap 'rm -f "$RUNNER_TEMP/cert.p12"' EXIT
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$CERT" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Stage provisioning profile from the secret
        env:
          PROFILE: ${{ secrets.MACOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/chromium-bridge.provisionprofile"
          printf '%s' "$PROFILE" | base64 -d > "$PROFILE_PATH"
          echo "PROVISION_PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, and verify the .dmg
        run: |
          bun install --frozen-lockfile
          bun scripts/desktop-bundle.ts --dmg

      # The bundle script names the image after the Cargo version; republish
      # it under the full release tag so a -rc/-dev prerelease's assets stay
      # distinguishable from the final release's.
      - name: Name the release asset
        id: dmg
        run: |
          # The asset name hardcodes arm64 (the supported macOS target), so
          # refuse to mislabel a build from a different runner arch.
          [ "$(uname -m)" = "arm64" ] || { echo "expected an arm64 runner, got $(uname -m)"; exit 1; }
          BUILT="$(ls build/dmg/*.dmg)"
          ASSET="chromium-bridge-app-${RELEASE_TAG}-macos-arm64.dmg"
          cp "$BUILT" "$ASSET"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      # Notarize + staple BEFORE hashing/attesting: stapling rewrites the
      # image, and the published checksum and provenance subject must match
      # the exact bytes users download.
      - name: Notarize and staple (only with notarization secrets)
        if: env.HAVE_NOTARY == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DMG: ${{ steps.dmg.outputs.asset }}
        run: |
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"

      - name: Note the notarization gap (no notarization secrets)
        if: env.HAVE_NOTARY != 'true'
        run: |
          echo "::notice::dmg is dev-signed, NOT notarized - Gatekeeper will warn on other Macs."
          echo "Notarization needs a paid Developer ID (APPLE_ID / APPLE_APP_PASSWORD / APPLE_TEAM_ID secrets)."

      - name: Checksum the dmg
        env:
          DMG: ${{ steps.dmg.outputs.asset }}
        run: shasum -a 256 "$DMG" > "$DMG.sha256"

      - name: Attest dmg provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.dmg.outputs.asset }}

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ${{ steps.dmg.outputs.asset }}
            ${{ steps.dmg.outputs.asset }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}

      - name: Delete the ephemeral keychain
        if: always()
        run: |
          if [ -n "${SIGNING_KEYCHAIN:-}" ] && [ -f "$SIGNING_KEYCHAIN" ]; then
            security delete-keychain "$SIGNING_KEYCHAIN"
          fi
