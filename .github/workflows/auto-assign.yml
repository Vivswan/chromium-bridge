# This file is managed by Vivswan/repo-platform.
# Local edits may be replaced during template updates.

name: Auto Assign

on:
  workflow_dispatch:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]
  # Code scanning alerts have no creation trigger for Actions, so assign them
  # after each CodeQL run completes, with a weekly cron as a catch-up.
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
  schedule:
    - cron: "23 6 * * 1"

permissions:
  issues: write
  pull-requests: write
  security-events: write

jobs:
  auto-assign:
    uses: Vivswan/repo-platform/.github/workflows/reusable-auto-assign.yml@4f694d4ef5ce170be630bd7e5674174b44407886
