# First-party CodeQL analysis via github/codeql-action, replacing the
# Vivswan/repo-platform reusable workflow (repo-platform is removed for now;
# it has no release yet). The language matrix matches the old configuration:
# javascript-typescript. The Rust crates can be added deliberately later
# (compiled-language analysis is a heavier, separate decision).

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: codeql
    # Code scanning needs Advanced Security on a private repository, so run
    # only where it can succeed: skip while the repo is private (the retired
    # reusable workflow skipped the same way). The event_name guard matters:
    # schedule payloads carry no repository object, and the expression
    # engine's loose equality would coerce that null equal to false and RUN
    # the job - push/PR coverage is what gates, so schedule is skipped.
    if: github.event_name != 'schedule' && github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          languages: javascript-typescript
          # Advanced setup does not run the alert-suppression queries by
          # default, so inline `codeql[query-id]` comments are inert without
          # this: append the suppression query to the default suite.
          packs: +codeql/javascript-queries:AlertSuppression.ql
      - uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
