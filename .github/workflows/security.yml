name: Security

# Weekly re-run of the security audits for advisories disclosed BETWEEN
# pushes: the same audits (audits.yml) gate every merge inside ci.yml's
# all-green, so this schedule only exists to surface a new advisory on a
# quiet repo instead of at the next PR.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audits:
    uses: ./.github/workflows/audits.yml
