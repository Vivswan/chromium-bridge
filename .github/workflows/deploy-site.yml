# Publishes src/apps/web (the landing page + rendered repo docs) to GitHub Pages
# in ONE deployment with two environments:
#   - the production root  <- built from the LATEST release tag
#   - /staging/            <- built from the tested main commit
# Called by release-please.yml (itself downstream of ci.yml's all-green gate)
# with tested-sha = the exact main commit that gate tested, so staging tracks
# main without ever publishing an untested tree; plus workflow_dispatch for
# manual/urgent redeploys (which build staging from live main, no test
# guarantee). The root is rebuilt from the release tag each time, so it only
# changes when a release PR merges. Before the FIRST release there is no tag:
# only staging is published and the production root returns GitHub's default
# 404 (intended).
#
# CUSTOM DOMAIN (config-only cutover): CUSTOM_DOMAIN is a repository Actions
# VARIABLE (Settings -> Secrets and variables -> Actions -> Variables), read
# here as vars.CUSTOM_DOMAIN. To cut over: set the variable (e.g.
# chromium-bridge.dev), then re-run this workflow (workflow_dispatch, or wait
# for the next release-please run) - changing the variable does not trigger a
# deploy by itself. The value picks the build's site/base and, when set, is
# written to _site/CNAME (the Pages custom-domain marker):
#   - unset -> project site: root at /chromium-bridge/, staging at
#              /chromium-bridge/staging/, origin https://vivswan.github.io
#              (no CNAME written).
#   - set   -> custom domain: root at /, staging at /staging/, origin
#              https://<domain>, and _site/CNAME is written (the Pages
#              custom-domain marker). ASTRO_SITE/ASTRO_BASE are passed to the
#              builds; site-identity.ts reads them, so no source edit needed.
#
# One-time repo setting: Pages source must be set to "GitHub Actions".
name: deploy-site

on:
  workflow_call:
    inputs:
      tested-sha:
        # Required on the call path: `github.event_name` inside a reusable
        # workflow is the CALLER's event, so a workflow_dispatch of ci.yml
        # reaching here through release-please.yml is indistinguishable from
        # a direct dispatch of this workflow by event name alone. An explicit
        # input keeps the two paths apart mechanically.
        description: >-
          The exact main commit CI tested; staging is built from it and the
          publish is skipped if main has moved past it.
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # The github-pages environment's deployment-branch policy (repo Settings ->
    # Environments -> github-pages) must allow `main` (or tags); that policy
    # lives in repo settings and cannot be set from this workflow.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Resolve the latest release tag without a checkout. No releases yet
      # means an empty tag (staging-only publish, the root 404s); any gh
      # failure exits nonzero.
      - name: Resolve latest release tag
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh release list -R "$GITHUB_REPOSITORY" --limit 1 \
            --exclude-drafts --exclude-pre-releases \
            --json tagName -q '.[0].tagName // empty')"
          if [ -n "$tag" ]; then
            echo "Latest release tag: $tag"
          else
            echo "No release yet; publishing staging only, the production root will 404."
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Production source = the latest release tag. Skipped entirely before
      # the first release (no tag); only staging is published then.
      - name: Checkout release (production root)
        if: steps.rel.outputs.tag != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.rel.outputs.tag }}
          path: release
          # This workflow only reads the repo; never leave a push-capable
          # token in the checkout.
          persist-credentials: false

      # Staging source: on the release-please call chain, the exact main
      # commit the all-green gate tested (tested-sha); on a direct manual
      # workflow_dispatch there is no input, so fall back to live main - a
      # dispatch from a tag/branch must not publish that ref as staging.
      - name: Checkout the tested main commit (staging)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tested-sha || 'main' }}
          path: staging
          persist-credentials: false

      # Each build runs under the bun version ITS OWN checkout pins
      # (packageManager in package.json), so a bun upgrade on main cannot
      # change how an already-released site builds. The production setup is
      # skipped with the rest of the release steps before the first release.
      - name: Set up bun (release pin)
        if: steps.rel.outputs.tag != ''
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: release/package.json

      # Production build. Base + origin depend on CUSTOM_DOMAIN (unset =>
      # project site under /chromium-bridge/; set => site at the domain
      # root). bun install runs at the checkout root (workspace lockfile);
      # the site itself is the src/apps/web workspace. Skipped before the first
      # release (no tag) so the root stays a 404. The release checkout is an
      # OLD tag, so its site may still live at the pre-move docs/site path
      # with a docs/site/dist output; detect the layout instead of assuming
      # (drop the fallback once the first src/apps/web release ships).
      - name: Build production (root = latest release)
        if: steps.rel.outputs.tag != ''
        working-directory: release
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          bun install --frozen-lockfile
          if [ -d src/apps/web ]; then SITE_DIR=src/apps/web; else SITE_DIR=docs/site; fi
          if [ -n "$CUSTOM_DOMAIN" ]; then
            ASTRO_SITE="https://$CUSTOM_DOMAIN" ASTRO_BASE=/ bun run --cwd "$SITE_DIR" build
          else
            ASTRO_BASE=/chromium-bridge/ bun run --cwd "$SITE_DIR" build
          fi

      # Staging runs under main's pin; this setup comes after the production
      # build so its bun wins for the steps below.
      - name: Set up bun (main pin)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: staging/package.json

      # Staging build: nested base path. /staging/ hangs off whichever root
      # the domain resolves to.
      - name: Build staging (main HEAD)
        working-directory: staging
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          bun install --frozen-lockfile
          if [ -n "$CUSTOM_DOMAIN" ]; then
            ASTRO_SITE="https://$CUSTOM_DOMAIN" ASTRO_BASE=/staging/ bun run --cwd src/apps/web build
          else
            ASTRO_BASE=/chromium-bridge/staging/ bun run --cwd src/apps/web build
          fi

      # Compose the single artifact. When a release exists, its dist is the
      # root and the staging dist goes under /staging/. Before the first
      # release there is no release dist, so _site holds ONLY staging and the
      # root 404s. A trailing `/.` copies directory CONTENTS (not the dir
      # itself). When a custom domain is set, write the CNAME marker GitHub
      # Pages needs.
      - name: Compose _site (root = release, /staging/ = main HEAD)
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          rm -rf _site
          mkdir -p _site/staging
          if [ -n "$TAG" ]; then
            # Pre-move releases output to docs/site/dist (see the build step).
            if [ -d release/build/web ]; then REL_OUT=release/build/web; else REL_OUT=release/docs/site/dist; fi
            cp -r "$REL_OUT"/. _site/
          else
            echo "No release tag; publishing staging only (the root will 404)."
          fi
          cp -r staging/build/web/. _site/staging/
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "$CUSTOM_DOMAIN" > _site/CNAME
            echo "Wrote _site/CNAME -> $CUSTOM_DOMAIN"
          fi

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      # Last look before publishing: if main moved past the tested commit
      # while this run was building, skip the publish and let the newer
      # push's own run deploy - publishing now would overwrite /staging/
      # with an older tree. A push can still land in the seconds between
      # this check and the publish finishing; that residual race is
      # accepted and self-heals when the newer push's run deploys. On a
      # direct workflow_dispatch (no tested-sha) staging was built from
      # live main, so there is nothing to compare - always publish.
      - name: Publish only if main still points at the tested commit
        id: fresh
        env:
          GH_TOKEN: ${{ github.token }}
          TESTED_SHA: ${{ inputs.tested-sha }}
        run: |
          if [ -z "$TESTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          head="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
          if [ "$head" = "$TESTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::main moved to ${head:0:7} since this run started; skipping the publish - the newer run deploys"
            echo "current=false" >> "$GITHUB_OUTPUT"
          fi

      - id: deployment
        if: steps.fresh.outputs.current == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
