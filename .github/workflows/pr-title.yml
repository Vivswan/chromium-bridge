# PRs are squash-merged, so the squash commit subject defaults to the PR
# title; enforcing a Conventional Commit PR title keeps versioning tooling
# (release-please) working. Examples: `feat: ...` (minor), `fix: ...`
# (patch), `feat!: ...` (major), `docs:`/`ci:` (no release).
#
# Zero-dependency inline check, replacing the Vivswan/repo-platform reusable
# workflow (repo-platform is removed for now; it has no release yet).

name: PR Title

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: conventional-title
    runs-on: ubuntu-latest
    steps:
      - name: PR title is a Conventional Commit
        env:
          # Via env, never interpolated into the script: a PR title is
          # attacker-controlled input and this is a pull_request_target job.
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # A control character (newline, CR, ESC, a C1 control) in a title
          # is refused outright - it can never be a valid squash-commit
          # subject, and a newline would also let a line-oriented grep match
          # one embedded line while the echoed text injects workflow log
          # commands. Bash's =~ sees the whole string including LF (grep
          # would strip it as a record separator); run steps use bash on
          # ubuntu runners. Checked under both locales: C catches the C0
          # range byte-wise even in malformed UTF-8, C.UTF-8 maps [[:cntrl:]]
          # to Unicode Cc and so catches C1 (U+0080-U+009F) too.
          ctrl=0
          export LC_ALL=C
          if [[ "$TITLE" =~ [[:cntrl:]] ]]; then ctrl=1; fi
          export LC_ALL=C.UTF-8
          if [[ "$TITLE" =~ [[:cntrl:]] ]]; then ctrl=1; fi
          if [ "$ctrl" -eq 1 ]; then
            echo "::error::PR title contains control characters; use a single plain-text line"
            exit 1
          fi
          regex='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9./-]+\))?(!)?: .+'
          if printf '%s' "$TITLE" | grep -qE "$regex"; then
            echo "PR title is a Conventional Commit: $TITLE"
          else
            echo "::error::PR title must be a Conventional Commit, e.g. 'feat(scope): add x' or 'fix!: correct y'. Got: $TITLE"
            exit 1
          fi
