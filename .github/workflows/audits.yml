# The security audit jobs, defined once and called from two places: ci.yml
# runs them inside the all-green merge gate (a new advisory lands as a red PR
# check, not a silent scheduled failure), and security.yml runs them weekly
# for advisories disclosed between pushes.
name: Audits

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cargo:
    name: cargo audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          # Pinned: these tools' verdicts gate the build, so their versions
          # must not drift underneath us. Bump deliberately.
          tool: cargo-deny@0.20.2,cargo-audit@0.22.2
      - name: cargo audit (RustSec advisories)
        run: cargo audit
      - name: cargo deny (advisories + licenses + bans + sources)
        run: cargo deny check
      # The fuzz crate is its own workspace, excluded from the root one, so
      # the root pass above never sees its lockfile - gate it separately with
      # its own config (the shipped gate stays strict; see the fuzz deny.toml).
      - name: cargo deny (fuzz workspace)
        run: cargo deny --manifest-path src/packages/core/fuzz/Cargo.toml --config src/packages/core/fuzz/deny.toml check

  bun-audit:
    name: bun audit (JS workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      # Fail only on high/critical; dev-only moderates are reported, not gated.
      - run: bun audit --audit-level=high
