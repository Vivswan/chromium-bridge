name: Nightly browser tests

# Runs the browser DOM + smoke tests against a freshly installed, CI-isolated
# Chrome on a schedule so we catch Chrome-version regressions without gating
# PRs. This mirrors the `browser` job in ci.yml (same pinned action SHAs, same
# steps) but is triggered by cron / manual dispatch instead of on push/PR.
#
# It uses browser-actions/setup-chrome to install an isolated Chrome into the
# runner and points CHROME_BIN at it - it never touches a developer's own
# browser or any machine outside the ephemeral CI runner.

on:
  schedule:
    # 05:17 UTC daily (off the top of the hour to avoid the scheduler rush).
    - cron: "17 5 * * *"
  workflow_dispatch:

# Never run two nightly passes at once; a newer run supersedes an in-flight one.
concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  browser:
    name: DOM + smoke (Chrome, scheduled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: chrome
        with:
          chrome-version: stable
      - run: bun install --frozen-lockfile
      - run: bun run --cwd src/apps/extension build
      - name: Typecheck tests
        run: bun run --cwd tests/browser typecheck
      - name: DOM-layer tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: bun tests/browser/dom_test.ts
      - name: Extension smoke test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        # The smoke test needs a non-headless browser (MV3 SW reliability), so
        # give it a virtual display. xvfb ships on GitHub's ubuntu runners.
        run: xvfb-run -a bun tests/browser/ext_test.ts

  # Mutation testing lives here rather than in the PR gate because a full
  # cargo-mutants pass is far too slow for every PR. Missed mutants (exit 2)
  # and mutant timeouts (exit 3) are reported, not fatal: they measure test
  # quality and get fixed deliberately, whereas a baseline build/test failure
  # is a real break.
  mutants:
    name: Mutation testing (cargo-mutants, scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-mutants
      - name: cargo mutants (missed mutants and timeouts reported, not fatal)
        run: |
          rc=0
          cargo mutants --no-shuffle || rc=$?
          echo "== outcome summary =="
          for f in missed timeout unviable; do
            if [ -s "mutants.out/$f.txt" ]; then
              echo "-- $f --"
              cat "mutants.out/$f.txt"
            fi
          done
          # Exit 2 (missed mutants) and exit 3 (mutant timeouts) both mean a
          # mutant survived the test suite: informational here. Anything else
          # (baseline build/test failure, usage error) is real.
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ] && [ "$rc" -ne 3 ]; then
            exit "$rc"
          fi

  # Fuzzing lives here rather than in the PR gate because libFuzzer needs a
  # nightly toolchain and a real run is far too slow for every PR. This is a
  # bounded pass over every cargo-fuzz target - the wire parsers AND the
  # semantic validators behind them - working from a corpus persisted across
  # nights; the "no findings" path is a normal pass, and a crash (a panic or
  # abort on hostile input) is fatal -- exactly the exit semantics of
  # scripts/fuzz-smoke.ts.
  fuzz:
    name: Fuzz smoke (cargo-fuzz, scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # bun only runs the smoke driver script; it is self-contained, so no
      # `bun install` is needed here.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: nightly
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-fuzz
      # The corpus persists across nightly runs via the actions cache: restore
      # the newest fuzz-corpus-v1-* entry, fuzz on top of it, save a fresh
      # entry (the run_id/run_attempt key is unique per run, so the save never
      # collides). --cmin bounds each snapshot's SIZE; the COUNT of daily
      # entries is bounded by GitHub's LRU cache eviction (10 GB per repo),
      # not by anything here. Bump the v1 prefix to deliberately restart the
      # corpus from scratch.
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: src/packages/core/fuzz/corpus
          key: fuzz-corpus-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            fuzz-corpus-v1-
      - name: Fuzz every target (bounded smoke; a crash is fatal)
        run: bun scripts/fuzz-smoke.ts --runs=200000 --max-total-time=120 --cmin
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: src/packages/core/fuzz/corpus
          key: fuzz-corpus-v1-${{ github.run_id }}-${{ github.run_attempt }}
      # A crashing input dies with the ephemeral runner unless uploaded. The
      # run_attempt suffix keeps a failed rerun (same run_id) from colliding
      # with the previous attempt's artifact.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: fuzz-artifacts-${{ github.run_attempt }}
          path: src/packages/core/fuzz/artifacts/

