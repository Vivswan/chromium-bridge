name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Reads the pinned channel + components from rust-toolchain.toml.
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release

  # The enclave/attestation code is cfg(target_os = "macos") and invisible to
  # the ubuntu jobs; without this job it would only ever be compiled at
  # release time. fmt is skipped (platform-independent, covered above).
  rust-macos:
    name: Rust (clippy, test) on macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Same platform-gap reasoning for the cfg(windows) loopback-TCP code.
  rust-windows:
    name: Rust (build, clippy, test) on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --all-targets
      # Windows-only lints (e.g. an import dead under cfg(windows)) must fail
      # CI here, matching the clippy gates on the other platforms.
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Supply-chain review: every dependency must be audited or explicitly
  # exempted in supply-chain/. `cargo vet` fails on any crate that is neither,
  # so a new or bumped dependency cannot land without a recorded decision.
  cargo-vet:
    name: cargo vet (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          # Pinned: this tool's verdict gates the build, so its version must
          # not drift underneath us. Bump deliberately.
          tool: cargo-vet@0.10.2
      - run: cargo vet --locked

  # Informational only: not in all-green's needs and no threshold, so it can
  # never block a merge. It exists to make coverage visible in the run log;
  # gating comes later, deliberately, if the numbers prove stable.
  coverage:
    name: Coverage (cargo-llvm-cov, informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --summary-only

  extension:
    name: Extension (typecheck, lint, format, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - name: Contracts in sync (packages/shared *.gen.ts generated from contracts/)
        run: |
          bun scripts/gen-ops.ts
          bunx biome format --write packages/shared/src/ops.gen.ts packages/shared/src/identity.gen.ts
          git diff --exit-code -- packages/shared/src/ops.gen.ts packages/shared/src/identity.gen.ts \
            || { echo "::error::generated contract code is stale - run 'just gen' after editing contracts/"; exit 1; }
      - name: Typecheck (extension, tests, scripts, packages/shared)
        run: bun run typecheck
      - name: Biome (lint + format)
        run: bunx biome ci .
      - name: packages/shared tests (contract equivalence, parity, boundary validators)
        run: bun run --cwd packages/shared test
      - run: bun run --cwd extension test
      - run: bun run --cwd extension build

  version-consistency:
    name: Version and extension ID consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - run: bun scripts/check-version.ts
      - run: bun scripts/check-extension-id.ts

  tooling:
    name: Tooling hygiene (shellcheck, typos, cargo-machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # shellcheck is preinstalled on GitHub's ubuntu runners. Only the
      # standalone shell scripts remain; the dev tooling is TypeScript now.
      - run: shellcheck install/install.sh scripts/build-repro.sh tests/install_verify_test.sh
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          # Pinned: these tools' verdicts gate the build. Bump deliberately.
          tool: typos@1.48.0,cargo-machete@0.9.2
      - run: typos
      - run: cargo machete

  linux-install:
    name: Linux installer (isolated XDG directories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun run --cwd extension build
      - name: Install for chrome,chromium,brave,edge (explicit keys)
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          XDG_DATA_HOME="$tmp/data" \
          XDG_CONFIG_HOME="$tmp/config" \
            ./install/install.sh --browser chrome,chromium,brave,edge --skip-extension-build
          test -x "$tmp/data/chromium-bridge/chromium-bridge"
          test -x "$tmp/data/chromium-bridge/run-host.sh"
          for d in google-chrome chromium BraveSoftware/Brave-Browser microsoft-edge; do
            manifest="$tmp/config/$d/NativeMessagingHosts/com.vivswan.chromium_bridge.host.json"
            test -f "$manifest"
            grep -q 'chrome-extension://mkjjlmjbcljpcfkfadfmhblmmddkdihf/' "$manifest"
          done
          "$tmp/data/chromium-bridge/chromium-bridge" --help
      - name: Install all, then uninstall removes every known registration
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export XDG_DATA_HOME="$tmp/data" XDG_CONFIG_HOME="$tmp/config"
          ./install/install.sh --browser all --skip-extension-build
          dirs="google-chrome chromium BraveSoftware/Brave-Browser microsoft-edge vivaldi opera"
          for d in $dirs; do
            test -f "$tmp/config/$d/NativeMessagingHosts/com.vivswan.chromium_bridge.host.json"
          done
          ./install/install.sh --uninstall
          for d in $dirs; do
            test ! -e "$tmp/config/$d/NativeMessagingHosts/com.vivswan.chromium_bridge.host.json"
          done
          test ! -e "$tmp/data/chromium-bridge/chromium-bridge"
      - name: Prebuilt-mode verification passes and fails closed (isolated fake archive)
        run: ./tests/install_verify_test.sh
      - name: Escape hatch --nm-dir, and uninstall clears table + explicit dirs
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export XDG_DATA_HOME="$tmp/data" XDG_CONFIG_HOME="$tmp/config"
          custom="$tmp/custom/NativeMessagingHosts"
          chrome="$tmp/config/google-chrome/NativeMessagingHosts/com.vivswan.chromium_bridge.host.json"
          # A standard browser plus an out-of-table one via the escape hatch.
          ./install/install.sh --browser chrome --skip-extension-build
          ./install/install.sh --nm-dir "$custom" --skip-extension-build
          test -f "$chrome"
          test -f "$custom/com.vivswan.chromium_bridge.host.json"
          grep -q 'chrome-extension://mkjjlmjbcljpcfkfadfmhblmmddkdihf/' "$custom/com.vivswan.chromium_bridge.host.json"
          # Uninstall with --nm-dir must clear BOTH the table dir and the explicit one.
          ./install/install.sh --uninstall --nm-dir "$custom"
          test ! -e "$chrome"
          test ! -e "$custom/com.vivswan.chromium_bridge.host.json"

  e2e:
    name: Protocol e2e (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: cargo build --release
      - run: python3 tests/e2e.py

  adversarial:
    name: Adversarial break-in (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: cargo build --release
      - run: python3 tests/adversarial.py

  chaos:
    name: Fault-injection chaos (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: cargo build --release
      - run: python3 tests/chaos.py

  browser:
    name: DOM + smoke (Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: chrome
        with:
          chrome-version: stable
      - run: bun install --frozen-lockfile
      - run: bun run --cwd extension build
      - name: Typecheck tests
        run: bun run --cwd tests typecheck
      - name: DOM-layer tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: bun tests/dom_test.ts
      - name: Extension smoke test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        # The smoke test needs a non-headless browser (MV3 SW reliability), so
        # give it a virtual display. xvfb ships on GitHub's ubuntu runners.
        run: xvfb-run -a bun tests/ext_test.ts

  typography:
    name: typography
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Vivswan/repo-platform/actions/check-typography@main

  all-green:
    name: all-green
    if: always()
    needs:
      [
        rust,
        rust-macos,
        rust-windows,
        cargo-vet,
        extension,
        version-consistency,
        tooling,
        linux-install,
        e2e,
        adversarial,
        chaos,
        browser,
        typography,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: All jobs green
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "results: $RESULTS"
          for result in $RESULTS; do
            if [ "$result" != "success" ]; then
              echo "::error::a required job did not succeed"
              exit 1
            fi
          done
