name: Nightly fuzz

# libFuzzer needs a nightly toolchain and a real run is far too slow for every
# PR, so fuzzing runs on its own schedule instead of the PR gate. This is a
# bounded pass over every cargo-fuzz target - the wire parsers AND the semantic
# validators behind them - working from a corpus persisted across nights; the
# "no findings" path is a normal pass, and a crash (a panic or abort on hostile
# input) is fatal -- exactly the exit semantics of scripts/fuzz-smoke.ts.
#
# It never touches a developer's machine or browser: everything runs in the
# ephemeral CI runner against arbitrary bytes fed to the parsers.

on:
  schedule:
    # 07:52 UTC. Randomly chosen minute inside the 2-5 AM US Eastern window
    # (02:52 EST / 03:52 EDT - inside the window either way), kept off the top
    # of the hour to dodge the scheduler rush.
    - cron: "52 7 * * *"
  workflow_dispatch:

# Never run two fuzz passes at once, but do NOT cancel an in-flight run: a
# cancelled run would drop the corpus growth it was about to save to the cache.
concurrency:
  group: nightly-fuzz-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz smoke (cargo-fuzz, scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # bun only runs the smoke driver script; it is self-contained, so no
      # `bun install` is needed here.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: nightly
          cache: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-fuzz
      # The corpus persists across nightly runs via the actions cache: restore
      # the newest fuzz-corpus-v1-* entry, fuzz on top of it, save a fresh
      # entry (the run_id/run_attempt key is unique per run, so the save never
      # collides). --cmin bounds each snapshot's SIZE; the COUNT of daily
      # entries is bounded by GitHub's LRU cache eviction (10 GB per repo),
      # not by anything here. Bump the v1 prefix to deliberately restart the
      # corpus from scratch.
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: src/packages/core/fuzz/corpus
          key: fuzz-corpus-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            fuzz-corpus-v1-
      - name: Fuzz every target (bounded smoke; a crash is fatal)
        run: bun scripts/fuzz-smoke.ts --runs=200000 --max-total-time=120 --cmin
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: src/packages/core/fuzz/corpus
          key: fuzz-corpus-v1-${{ github.run_id }}-${{ github.run_attempt }}
      # A crashing input dies with the ephemeral runner unless uploaded. The
      # run_attempt suffix keeps a failed rerun (same run_id) from colliding
      # with the previous attempt's artifact.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: fuzz-artifacts-${{ github.run_attempt }}
          path: src/packages/core/fuzz/artifacts/
