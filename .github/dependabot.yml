# This file is managed by Vivswan/repo-platform.
# Local edits may be replaced during template updates.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  # Rust workspace (template's stack is bun-ts; cargo added for this repo)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  # bun workspace (root bun.lock covers src/apps/extension, src/packages/*,
  # tests/browser, scripts). Dependabot's bun ecosystem keeps both the
  # manifests and bun.lock current.
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
