# This file is managed by Vivswan/repo-platform.
# Local edits may be replaced during template updates.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  # Rust workspace (template's stack is bun-ts; cargo added for this repo)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  # Extension (esbuild / typescript / eslint / prettier / @types)
  - package-ecosystem: "npm"
    directory: "/extension"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  # Test harness (puppeteer-core / bun+chrome types / typescript)
  - package-ecosystem: "npm"
    directory: "/tests"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
