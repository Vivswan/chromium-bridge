[package]
name = "browser-bridge"
version = "0.1.0"
edition = "2021"
description = "Bridge an MCP client to your real Chrome via an extension + native messaging host"
license = "Apache-2.0"

[[bin]]
name = "browser-bridge"
path = "src/main.rs"

[dependencies]
hmac = "0.13"
libc = "0.2.186"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = { version = "0.11", default-features = false }
thiserror = "2.0.18"

[dev-dependencies]
# Property-based testing for the protocol parsing boundary. Kept lean
# (no `fork`/`timeout`/`regex-syntax` features) so it spawns no processes and
# its dependency tree stays within the licenses allowed by `deny.toml`.
proptest = { version = "1", default-features = false, features = ["std"] }

[profile.release]
opt-level = "z"
lto = true
panic = "abort"

# Secure Enclave enrollment key (src/enclave.rs). The vetted wrapper crate is
# used instead of hand-rolled Security.framework FFI; OSX_10_15 is required
# for the data-protection keychain, the only keychain that can hold
# Secure Enclave keys. The -sys crate is a direct dependency only for the
# SecAccessControl flag constants the wrapper does not re-export, and
# core-foundation only for reading key attributes (token-id validation).
[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10"
security-framework = { version = "3", features = ["OSX_10_15"] }
security-framework-sys = "2"
