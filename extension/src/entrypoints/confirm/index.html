<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Chromium Bridge - Confirm</title>
  <style>
    :root {
      --fg: #111827; --muted: #6b7280; --line: #e5e7eb; --bg-soft: #f9fafb;
      --danger: #dc2626; --danger-dark: #b91c1c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-size: 14px; line-height: 1.5; background: #fff;
           display: flex; flex-direction: column; min-height: 100vh; }
    h1 { font-size: 16px; margin: 0 0 2px; color: var(--danger-dark); }
    .origin { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted);
              word-break: break-all; margin-bottom: 2px; }
    .tab-title { font-size: 12px; color: var(--muted); margin-bottom: 12px;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .question { font-weight: 600; margin-bottom: 10px; }
    .detail { flex: 1; overflow: auto; background: var(--bg-soft); border: 1px solid var(--line);
              border-radius: 8px; padding: 10px 12px; margin-bottom: 12px;
              font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap;
              word-break: break-word; min-height: 60px; max-height: 320px; }
    .warn { font-size: 12px; color: var(--danger-dark); margin-bottom: 12px; }
    .countdown { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .actions { display: flex; gap: 10px; justify-content: flex-end; }
    button { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
             cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #deny { border: 1px solid var(--line); background: #fff; color: var(--fg); }
    #allow { border: 1px solid var(--danger); background: var(--danger); color: #fff; }
    #allow:hover:not(:disabled) { background: var(--danger-dark); }
    .gone { color: var(--muted); text-align: center; margin-top: 40px; }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #e6e8eb; --muted: #9aa3af; --line: #333a44; --bg-soft: #20242a;
              --danger: #f87171; --danger-dark: #fca5a5; }
      body { background: #15181c; }
      #deny { background: #1e2228; }
      #allow { background: #b91c1c; border-color: #b91c1c; color: #fff; }
    }
  </style>
</head>
<body>
  <h1 id="title">Chromium Bridge</h1>
  <div class="origin" id="origin"></div>
  <div class="tab-title" id="tab-title"></div>
  <div class="question" id="question"></div>
  <pre class="detail" id="detail"></pre>
  <div class="warn" id="warn" style="display:none"></div>
  <div class="countdown" id="countdown"></div>
  <div class="actions">
    <button type="button" id="deny">Deny</button>
    <button type="button" id="allow" disabled>Allow</button>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
